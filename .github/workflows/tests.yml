name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-docs:
    name: "Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install --group dev

      - name: Run tests
        run: pytest
